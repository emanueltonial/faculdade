name: Atualiza README

on:
  push:
    branches:
      - main
      - "branch/**"
    paths:
      - "**/*.java"
      - "**/*.cpp"
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.sql"
      - "**/*.php"
      - "**/*.md"

concurrency:
  group: update-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    name: Atualiza README automaticamente
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Conta arquivos por tipo
        id: contagem
        run: |
          count_files() {
            find . -type f -name "$1" \
              -not -path "./.git/*" \
              -not -path "./.github/*" \
              | wc -l
          }

          echo "java=$(count_files '*.java')" >> "$GITHUB_OUTPUT"
          echo "cpp=$(count_files '*.cpp')" >> "$GITHUB_OUTPUT"
          echo "html=$(count_files '*.html')" >> "$GITHUB_OUTPUT"
          echo "css=$(count_files '*.css')" >> "$GITHUB_OUTPUT"
          echo "js=$(count_files '*.js')" >> "$GITHUB_OUTPUT"
          echo "sql=$(count_files '*.sql')" >> "$GITHUB_OUTPUT"
          echo "php=$(count_files '*.php')" >> "$GITHUB_OUTPUT"
          echo "md=$(count_files '*.md')" >> "$GITHUB_OUTPUT"

      - name: Atualiza README
        run: |
          cat > README.md << EOF
          # 📚 Repositório Faculdade - IFRS

          ## 📊 Progresso por linguagem

          | Linguagem | Arquivos |
          |-----------|----------|
          | ☕ Java | ${{ steps.contagem.outputs.java }} |
          | ⚙️ C++ | ${{ steps.contagem.outputs.cpp }} |
          | 🌐 HTML | ${{ steps.contagem.outputs.html }} |
          | 🎨 CSS | ${{ steps.contagem.outputs.css }} |
          | 🟨 JavaScript | ${{ steps.contagem.outputs.js }} |
          | 🗄️ SQL | ${{ steps.contagem.outputs.sql }} |
          | 🐘 PHP | ${{ steps.contagem.outputs.php }} |
          | 📝 Markdown | ${{ steps.contagem.outputs.md }} |

          ## ✅ Pipelines ativos

          | Workflow | Gatilho |
          |----------|---------|
          | Quality Gate | Todo push |
          | Build Java | Mudança em \`.java\` |
          | Lint Web | Mudança em \`.html\`, \`.css\`, \`.js\` |
          | Atualiza README | Mudança em arquivos de código |

          ## 📁 Estrutura

          \`\`\`
          Faculdade/
          ├── 1semestre/
          ├── 2semestre/
          └── 3semestre/
          \`\`\`

          > 🤖 Atualizado automaticamente em: $(date -u '+%Y-%m-%d %H:%M UTC')
          > 📌 Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}
          EOF

      - name: Commit e push do README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "Nenhuma mudança no README. Nada a commitar."
            exit 0
          fi

          git commit -m "ci: atualiza README [skip ci]"
          git push