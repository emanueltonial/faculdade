name: Build Java

on:
  push:
    branches:
      - main
      - "branch/**"
    paths:
      - "**/*.java"
  pull_request:
    paths:
      - "**/*.java"

concurrency:
  group: build-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-java:
    name: Compila projetos Java por pasta
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Descobre pastas com arquivos Java
        id: discovery
        run: |
          # Encontra todas as pastas únicas que contêm .java
          # Agrupa por diretório — cada pasta é um "projeto/exercício"
          dirs=$(find . -type f -name "*.java" \
            -not -path "./.git/*" \
            -not -path "./.github/*" \
            | xargs -I{} dirname {} \
            | sort -u)

          echo "Pastas encontradas:"
          echo "$dirs"

          # Salva em arquivo para o próximo step consumir
          echo "$dirs" > /tmp/java_dirs.txt

      - name: Compila cada pasta como projeto independente
        id: compile
        run: |
          mkdir -p logs
          failed_projects=()
          success_projects=()

          while IFS= read -r dir; do
            [ -z "$dir" ] && continue

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Compilando projeto: $dir"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Cria pasta de output isolada por projeto
            # Substitui / por _ para criar nome seguro
            safe_name=$(echo "$dir" | tr '/' '_')
            out_dir="out/$safe_name"
            mkdir -p "$out_dir"

            # Coleta todos os .java da pasta (compilação conjunta)
            # Isso resolve dependências entre classes do mesmo pacote
            java_files=$(find "$dir" -maxdepth 1 -name "*.java")

            if [ -z "$java_files" ]; then
              echo "Nenhum .java direto nessa pasta, pulando."
              continue
            fi

            echo "  Arquivos: $(echo "$java_files" | wc -l)"

            # Compila todos os .java da pasta juntos
            # O -cp "$out_dir" permite que classes do mesmo pacote se enxerguem
            if javac -d "$out_dir" -cp "$out_dir" $java_files 2>> logs/build-java.log; then
              echo "Sucesso"
              success_projects+=("$dir")
            else
              echo "Falhou"
              failed_projects+=("$dir")
              echo "FALHA: $dir" >> logs/build-java.log
            fi

          done < /tmp/java_dirs.txt

          # Resumo final
          echo ""
          echo "=============================="
          echo "RESUMO BUILD JAVA"
          echo "=============================="
          echo "Sucesso: ${#success_projects[@]} projeto(s)"
          echo "Falhas:  ${#failed_projects[@]} projeto(s)"

          {
            echo ""
            echo "=============================="
            echo "RESUMO BUILD JAVA"
            echo "Data: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Autor: ${{ github.actor }}"
            echo "Sucesso: ${#success_projects[@]}"
            echo "Falhas:  ${#failed_projects[@]}"
            if [ ${#failed_projects[@]} -gt 0 ]; then
              echo ""
              echo "Projetos com falha:"
              printf '  - %s\n' "${failed_projects[@]}"
            fi
            echo "=============================="
          } >> logs/build-java.log

          echo "failed=${#failed_projects[@]}" >> "$GITHUB_OUTPUT"
          echo "success=${#success_projects[@]}" >> "$GITHUB_OUTPUT"

          if [ "${#failed_projects[@]}" -gt 0 ]; then
            echo ""
            echo "Os seguintes projetos falharam:"
            printf '  - %s\n' "${failed_projects[@]}"
            exit 1
          fi

          echo "Todos os ${#success_projects[@]} projeto(s) compilaram com sucesso."

      - name: Upload do log de compilação
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-build-java-${{ github.sha }}
          path: logs/build-java.log
          retention-days: 7