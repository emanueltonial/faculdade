name: Atualiza README

on:
  push:
    branches:
      - main
      - "branch/**"
    paths:
      - "**/*.java"
      - "**/*.cpp"
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.sql"
      - "**/*.php"
      - "**/*.md"
      - ".github/workflows/update-readme.yml"

concurrency:
  group: "update-readme-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  update-readme:
    name: Atualiza README automaticamente
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Conta arquivos por tipo
        id: contagem
        shell: bash
        run: |
          count_files() {
            find . -type f -name "$1" \
              -not -path "./.git/*" \
              -not -path "./.github/*" \
              | wc -l | tr -d ' '
          }

          echo "java=$(count_files '*.java')" >> "$GITHUB_OUTPUT"
          echo "cpp=$(count_files '*.cpp')" >> "$GITHUB_OUTPUT"
          echo "html=$(count_files '*.html')" >> "$GITHUB_OUTPUT"
          echo "css=$(count_files '*.css')" >> "$GITHUB_OUTPUT"
          echo "js=$(count_files '*.js')" >> "$GITHUB_OUTPUT"
          echo "sql=$(count_files '*.sql')" >> "$GITHUB_OUTPUT"
          echo "php=$(count_files '*.php')" >> "$GITHUB_OUTPUT"
          echo "md=$(count_files '*.md')" >> "$GITHUB_OUTPUT"

      - name: Atualiza README
        shell: bash
        env:
          JAVA_COUNT: ${{ steps.contagem.outputs.java }}
          CPP_COUNT: ${{ steps.contagem.outputs.cpp }}
          HTML_COUNT: ${{ steps.contagem.outputs.html }}
          CSS_COUNT: ${{ steps.contagem.outputs.css }}
          JS_COUNT: ${{ steps.contagem.outputs.js }}
          SQL_COUNT: ${{ steps.contagem.outputs.sql }}
          PHP_COUNT: ${{ steps.contagem.outputs.php }}
          MD_COUNT: ${{ steps.contagem.outputs.md }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          UPDATED_AT="$(date -u '+%Y-%m-%d %H:%M UTC')"

          cat > README.md <<EOF
          ![Banner](images/ifrs.png)

          # Análise e Desenvolvimento de Sistemas - IFRS Erechim

          Olá!  
          Este repositório reúne os conteúdos, projetos e exercícios que desenvolvo ao longo do curso de **Análise e Desenvolvimento de Sistemas (ADS)** no **Instituto Federal do Rio Grande do Sul (IFRS), campus Erechim**.

          Aqui você encontrará materiais que ajudam no meu aprendizado e crescimento na área de tecnologia e programação.

          ---

          **Autor:** Emanuel D'Agostini Tonial  
          **Curso:** Análise e Desenvolvimento de Sistemas (ADS)  
          **Instituição:** IFRS - Campus Erechim  

          ---

          ## 📊 Progresso por Linguagem

          | Linguagem | Arquivos |
          |---|---:|
          | ☕ Java | $JAVA_COUNT |
          | ⚙️ C++ | $CPP_COUNT |
          | 🌐 HTML | $HTML_COUNT |
          | 🎨 CSS | $CSS_COUNT |
          | 🟨 JavaScript | $JS_COUNT |
          | 🗄️ SQL | $SQL_COUNT |
          | 🐘 PHP | $PHP_COUNT |
          | 📝 Markdown | $MD_COUNT |

          ---

          ## ✅ Esteira CI/CD Ativa

          | Workflow | Responsabilidade |
          |---|---|
          | 🛡️ quality-gate | Bloqueia VMs e arquivos grandes |
          | 🌐 lint-web | Valida HTML, CSS e JS |
          | 📝 update-readme | Atualiza este README automaticamente |

          ---

          > 🤖 Atualizado automaticamente em: $UPDATED_AT  
          > 📌 Branch: \`$BRANCH_NAME\`  
          > 🔖 Commit: \`$COMMIT_SHA\`

          ---

          Fique à vontade para explorar o conteúdo!
          EOF

      - name: Commit e push do README
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "ℹ️ Nenhuma mudança no README. Nada a commitar."
            exit 0
          fi

          git commit -m "ci: atualiza README [skip ci]"
          git push